name: Deploy Website to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Site URL (e.g. https://previewctl.github.io)"
        required: false
        default: "https://previewctl.github.io"
      base_path:
        description: "Base path for the site (e.g. /previewctl-cli)"
        required: false
        default: "/previewctl-cli"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Remove lockfile for cross-platform compatibility
        run: rm -f ./website/package-lock.json

      - name: Write env file
        run: |
          echo "SITE_URL=${{ github.event.inputs.site_url || 'https://previewctl.github.io' }}" >> ./website/.env
          echo "BASE_PATH=${{ github.event.inputs.base_path || '/previewctl-cli' }}" >> ./website/.env

      - name: Install, build, and upload site
        uses: withastro/action@v5
        with:
          path: ./website
          package-manager: npm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
