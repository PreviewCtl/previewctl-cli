name: Deploy Website to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Site URL (e.g. https://previewctl.com)"
        required: false
        default: "https://previewctl.com"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Remove lockfile for cross-platform compatibility
        run: rm -f ./website/package-lock.json

      - name: Install, build, and upload site
        uses: withastro/action@v5
        with:
          path: ./website
          package-manager: npm@latest
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://previewctl.com' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
