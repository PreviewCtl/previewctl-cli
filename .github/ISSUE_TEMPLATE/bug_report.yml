name: 🐞 Bug Report
description: "File a new bug report."
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > **Please ensure you are using the latest version of PreviewCtl before submitting an issue, as the bug may have already been fixed in a recent update.**

        Thanks for taking the time to fill out this bug report! The more details you provide, the faster we can help.

  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Error Message and Logs
      description: Provide any error messages or relevant log output.
      render: shell
    validations:
      required: false

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Please provide a step-by-step guide to reproduce the issue. Be as detailed as possible.
      value: |
        1. 
        2. 
        3. 
        4.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    attributes:
      label: PreviewCtl Version
      description: Run `previewctl version` or check `go install` output.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: textarea
    attributes:
      label: preview.yml Config
      description: Share your `.previewctrl/preview.yml` (redact secrets). Helps us reproduce the issue.
      render: yaml
    validations:
      required: false

  - type: input
    attributes:
      label: Docker Version
      description: Run `docker --version` and provide the output.
      placeholder: "Docker 27.0.0"
    validations:
      required: false

  - type: dropdown
    attributes:
      label: Build Type
      description: What build type are the affected services using?
      multiple: true
      options:
        - Dockerfile
        - Nixpacks
        - Railpack
        - Image (pre-built)
        - N/A
    validations:
      required: false

  - type: input
    attributes:
      label: Operating System
      description: Provide your OS and version.
      placeholder: "macOS 15.0 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false

  - type: input
    attributes:
      label: Go Version
      description: Run `go version` if you built from source.
      placeholder: "go1.26.0"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Any other relevant information, screenshots, or context about the issue.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported.
          required: true
        - label: I am using the latest version of PreviewCtl (or have noted my version above).
          required: true
        - label: I have provided all the information needed to reproduce this issue.
          required: true
