name: ✨ Feature Request
description: "Suggest an idea or enhancement for PreviewCtl."
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please fill out the details below to help us understand your request.

  - type: textarea
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as detailed as possible.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    attributes:
      label: Feature Area
      description: What area of PreviewCtl does this relate to?
      options:
        - CLI Commands
        - Build System (Dockerfile / Nixpacks / Railpack)
        - Configuration (preview.yml)
        - Docker Integration
        - Networking
        - Secrets / Environment Variables
        - Service Dependencies (DAG)
        - TTL / Cleanup
        - Port Mapping
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Use Case
      description: Describe your use case and how this feature would benefit you and others.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context, mockups, screenshots, or examples about the feature request.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested.
          required: true
        - label: I would be willing to help implement this feature.
          required: false
